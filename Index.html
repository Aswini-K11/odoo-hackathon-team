<!DOCTYPE html>
<html>
<head>
<title>AssetFlow Dashboard</title>
<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}
header{
    background:#0d6efd;
    color:white;
    padding:15px;
    text-align:center;
}
.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}
.card{
    width:180px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 8px gray;
    text-align:center;
}
button{
    margin-top:10px;
    padding:8px 15px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>AssetFlow Dashboard</h1>
</header>

<div class="container">

<div class="card">
<h3>Assets</h3>
<h2 id="assets">120</h2>
<button onclick="addAsset()">Add Asset</button>
</div>

<div class="card">
<h3>Bookings</h3>
<h2>18</h2>
</div>

<div class="card">
<h3>Maintenance</h3>
<h2>5</h2>
</div>

</div>

<script>
function addAsset(){
    let count=document.getElementById("assets");
    count.innerHTML=parseInt(count.innerHTML)+1;
}
</script>

</body>
</html>
